extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/0nliner/archtool
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/archtool
  sponsor:
    url: https://github.com/sponsors/0nliner
    title: Sponsor archtool
